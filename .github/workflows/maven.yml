
on:
  push:
    branches: [ "gh-pages" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      
    - name: Generate Javadoc
      run: mvn javadoc:javadoc
      

    - name: Publish Javadoc
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: target/docs/javadoc
