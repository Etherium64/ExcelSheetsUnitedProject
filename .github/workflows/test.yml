name: JavaFX Test Suite

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'corretto'

    - name: Install JavaFX dependencies
      run: |
        echo "JavaFX is included via Maven, no extra install needed."

    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Build and Run Tests
      run: mvn clean test

    - name: Generate HTML Test Report
      run: mvn surefire-report:report

    - name: Copy Report to docs
      run: |
        mkdir -p Documents
        cp target/surefire-report.html Documents/

    - name: Upload HTML Report
      uses: actions/upload-artifact@v4
      with:
          name: test-report-html
          path: Documents/surefire-report.html

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: target/surefire-reports/
